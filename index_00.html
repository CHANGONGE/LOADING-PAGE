<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANG-GONG-I | AI Business Architect</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+KR:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #D4AF37;
            --gold-secondary: #F4E0AF;
            --bg-dark: #05080A;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--bg-dark) 100%);
            color: var(--gold-secondary);
            font-family: 'Noto Sans KR', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .premium-frame {
            position: relative;
            padding: 60px 80px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 1), inset 0 0 20px rgba(212, 175, 55, 0.1);
            animation: fadeIn 2s ease-out;
        }

        /* 모서리 장식 */
        .premium-frame::before, .premium-frame::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--gold-primary);
        }
        .premium-frame::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .premium-frame::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .subtitle {
            font-size: 14px;
            letter-spacing: 8px;
            color: var(--gold-primary);
            margin-bottom: 25px;
            font-weight: 300;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to bottom, var(--gold-secondary) 0%, var(--gold-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            letter-spacing: 4px;
        }

        .divider {
            width: 100px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold-primary), transparent);
            margin: 30px auto;
        }

        .name {
            font-size: 1.2rem;
            letter-spacing: 12px;
            font-weight: 100;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="premium-frame">
        <div class="subtitle">30 YEARS OF DATA INSIGHT</div>
        <h1>AI BUSINESS ARCHITECT</h1>
        <div class="divider"></div>
        <div class="name">CHANG-GONG-I</div>
    </div>
</body>
</html>
