<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시스템 초기화 중</title>
    <style>
        body {
            margin: 0;
            background: #0a1628; /* 깊이 있는 네이비 블랙 */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Pretendard', -apple-system, sans-serif;
            overflow: hidden;
        }

        .main-orb {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 회전하는 아주 얇은 외곽선 */
        .orb-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-top: 1px solid #C9A84C;
            border-radius: 50%;
            animation: rotate 2s linear infinite;
        }

        .text-center {
            text-align: center;
            z-index: 10;
        }

        /* 원 내부의 한글 텍스트 */
        .main-title {
            color: #C9A84C;
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .sub-title {
            color: #fff;
            font-size: 0.8rem;
            margin-top: 10px;
            letter-spacing: 2px;
            opacity: 0.6;
            font-weight: 300;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="main-orb">
        <div class="orb-ring"></div>
        <div class="text-center">
            <h1 class="main-title">데이터 아키텍트</h1>
            <div class="sub-title">시스템 로딩 중</div>
        </div>
    </div>
</body>
</html>
