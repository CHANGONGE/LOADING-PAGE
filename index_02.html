<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INITIALIZING... | CHANG-GONG-I</title>
    <style>
        body {
            margin: 0;
            background: #05080A; /* 사령관님이 선호하시는 네이비 블랙 */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Pretendard', sans-serif;
        }

        .loader-wrapper {
            position: relative;
            width: 200px; /* 원의 크기를 작고 직관적으로 조정 */
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 메인 로딩 원 (작고 얇은 선) */
        .loader-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top: 2px solid #D4AF37; /* 포인트 골드 */
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        }

        .text-group {
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: #D4AF37;
            font-size: 1.1rem;
            letter-spacing: 3px;
            margin: 0;
            font-weight: 300;
        }

        .dots {
            color: #fff;
            font-size: 0.7rem;
            margin-top: 8px;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader-wrapper">
        <div class="loader-circle"></div>
        <div class="text-group">
            <h1>AI ARCHITECT</h1>
            <div class="dots">INITIALIZING</div>
        </div>
    </div>
</body>
</html>
